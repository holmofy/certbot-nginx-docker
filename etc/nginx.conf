worker_processes  auto;

events {
    worker_connections  512;
}

error_log /var/log/nginx/error.log;

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    gzip  on;

    server {
        listen       80;
        server_name  www.hufeifei.cn;
        server_tokens off;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # server {
    #     listen       443 ssl;
    #     server_name  www.hufeifei.cn;

    #     ssl_certificate /etc/letsencrypt/live/www.hufeifei.cn/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/www.hufeifei.cn/privkey.pem;

    #     location / {
    #         root   /usr/share/nginx/html/www.hufeifei.cn;
    #         index  index.html index.htm;
    #     }

    #     error_page  404              /404.html;
    # }

    server {
        listen 80;
        server_name ip.hufeifei.cn;
        location / {
            default_type text/plain;
            return 200 "$remote_addr\n";
        }
    }

}
