version: '2'

services:
    nginx:
        image: nginx:stable-alpine
        ports:
            - 80:80
        volumes:
            - ./etc/nginx.conf:/etc/nginx/nginx.conf
            - ./log:/var/log/nginx
            - ./html:/usr/share/nginx/html
            - ./etc/letsencrypt:/etc/letsencrypt
    certbot:
        image: certbot/certbot:v1.12.0
        volumes:
            - ./etc/letsencrypt:/etc/letsencrypt
